<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>WAPI Runtime</title>
    <style>
        :root {
            --statsbar-h: 22px;
            /* Inset the WAPI canvas so the stats bar isn't overlaid on top of it. */
            --wapi-canvas-top: var(--statsbar-h);
        }
        * { margin: 0; padding: 0; box-sizing: border-box; }
        html, body { width: 100%; height: 100%; overflow: hidden; background: #000; }
        canvas { touch-action: none; }
        #loading {
            position: fixed;
            top: 50%; left: 50%;
            transform: translate(-50%, -50%);
            color: #888;
            font-family: system-ui, sans-serif;
            font-size: 14px;
        }
        #loading.hidden { display: none; }

        #statsbar {
            position: fixed;
            top: 0; left: 0; right: 0;
            height: var(--statsbar-h);
            line-height: var(--statsbar-h);
            padding: 0 8px;
            background: #101014;
            border-bottom: 1px solid #222;
            color: #ddd;
            font-family: ui-monospace, Menlo, Consolas, monospace;
            font-size: 11px;
            white-space: nowrap;
            overflow: hidden;
            text-overflow: ellipsis;
            z-index: 9999;
            pointer-events: none;
            user-select: none;
        }
        #statsbar .k { color: #666; }
        #statsbar .v { color: #9fe; }
        #statsbar .bad { color: #f66; }
        #statsbar .warn { color: #fc6; }
        #statsbar .sep { color: #333; padding: 0 6px; }
    </style>
</head>
<body>
    <div id="statsbar">booting…</div>
    <div id="loading">Loading...</div>
    <script src="./pako_inflate.min.js"></script>
    <script>
        // The WAPI extension content script injects the shim at document_start
        // in the MAIN world, so window.WAPI is already defined if it's installed.
        // Only load the page-local copy when the extension hasn't provided it —
        // loading both re-executes the top-level const declarations and throws
        // a SyntaxError.
        if (typeof window.WAPI !== 'function') {
            document.write('<script src="./wapi_shim.js"><\/script>');
        }
    </script>
    <script type="module">
        const statsEl = document.getElementById('statsbar');
        const loadingEl = document.getElementById('loading');

        function fatal(title, body) {
            statsEl.innerHTML = `<span class="bad">${title}</span>`;
            loadingEl.classList.remove('hidden');
            loadingEl.innerHTML = body;
            loadingEl.style.color = '#ddd';
            loadingEl.style.textAlign = 'left';
            loadingEl.style.maxWidth = '560px';
            loadingEl.style.lineHeight = '1.5';
            console.error('[boot]', title);
        }

        // The WAPI shim is provided either by the local <script> tag above
        // or by the WAPI browser extension content script. If neither loaded
        // (bad deployment, extension not installed) window.WAPI is missing.
        if (typeof window.WAPI !== 'function') {
            fatal('WAPI shim not found',
                `<b>The WAPI runtime is not loaded on this page.</b><br><br>` +
                `This page expects <code>window.WAPI</code> to be available, ` +
                `provided by either:<br>` +
                `&nbsp;&nbsp;• the inline <code>wapi_shim.js</code> script (co-located with this page), or<br>` +
                `&nbsp;&nbsp;• the <b>WAPI Runtime</b> browser extension.<br><br>` +
                `To install the extension:<br>` +
                `&nbsp;&nbsp;1. Open <code>chrome://extensions/</code><br>` +
                `&nbsp;&nbsp;2. Enable <b>Developer mode</b> (top right)<br>` +
                `&nbsp;&nbsp;3. Click <b>Load unpacked</b> and select the <code>runtime/browser</code> directory<br>` +
                `&nbsp;&nbsp;4. Reload this tab<br><br>` +
                `If the extension is already installed, click its <b>↻ reload</b> button ` +
                `after any <code>wapi_shim.js</code> rebuild and then reload the tab.`);
            throw new Error('WAPI shim not available');
        }
        const { WAPI } = window;

        async function main() {
            const tBoot = performance.now();
            let loadMs = 0;
            let firstFrameMs = 0;

            const params = new URLSearchParams(window.location.search);
            const wasmUrlBase = params.get('app') || 'app.wasm';
            const wasmUrl = wasmUrlBase + (wasmUrlBase.includes('?') ? '&' : '?') + '_cb=' + Date.now();
            console.log('[boot] wasm =', wasmUrl);

            // Pre-flight the wasm URL so a 404 / text response becomes a
            // clear error instead of a "magic word" CompileError.
            let wasmResp;
            try {
                wasmResp = await fetch(wasmUrl);
            } catch (e) {
                fatal('Wasm fetch failed',
                    `Could not fetch <code>${wasmUrlBase}</code>: ${e.message || e}`);
                return;
            }
            if (!wasmResp.ok) {
                fatal(`Wasm ${wasmResp.status}`,
                    `Server returned <b>${wasmResp.status} ${wasmResp.statusText}</b> for ` +
                    `<code>${wasmUrlBase}</code>.<br><br>` +
                    `Pass the app path via <code>?app=&lt;path/to/app.wasm&gt;</code> in the URL, ` +
                    `or place <code>app.wasm</code> next to this page.`);
                return;
            }
            const contentType = wasmResp.headers.get('content-type') || '';
            const wasmBytes = await wasmResp.arrayBuffer();
            if (wasmBytes.byteLength < 8) {
                fatal('Wasm payload empty',
                    `Response for <code>${wasmUrlBase}</code> was ${wasmBytes.byteLength} bytes.`);
                return;
            }
            const magic = new Uint8Array(wasmBytes, 0, 4);
            if (!(magic[0] === 0x00 && magic[1] === 0x61 && magic[2] === 0x73 && magic[3] === 0x6d)) {
                const head = new TextDecoder().decode(new Uint8Array(wasmBytes, 0, Math.min(80, wasmBytes.byteLength)));
                fatal('Not a wasm file',
                    `<code>${wasmUrlBase}</code> did not start with the wasm magic bytes ` +
                    `(content-type: <code>${contentType || 'unknown'}</code>).<br><br>` +
                    `First bytes: <code>${head.replace(/[<&]/g, c => ({'<':'&lt;','&':'&amp;'}[c]))}</code>`);
                return;
            }

            const wapi = new WAPI();
            window.wapi = wapi;

            let gpuErrorCount = 0;
            let lastGpuError = '';
            function installGpuErrorHook() {
                const dev = wapi._gpuDevice;
                if (!dev || dev.__wapi_hooked) return;
                dev.__wapi_hooked = true;
                dev.addEventListener && dev.addEventListener('uncapturederror', ev => {
                    gpuErrorCount++;
                    lastGpuError = (ev.error && ev.error.message) || String(ev);
                    console.error('[gpu.uncaptured]', lastGpuError);
                });
                dev.onuncapturederror = ev => {
                    gpuErrorCount++;
                    lastGpuError = (ev.error && ev.error.message) || String(ev);
                    console.error('[gpu.uncaptured]', lastGpuError);
                };
                dev.lost && dev.lost.then(info => {
                    console.error('[gpu.lost]', info && (info.reason + ': ' + info.message));
                });
            }

            try {
                await wapi.load(wasmBytes, {
                    preopens: { '/': {}, '/tmp': {} },
                    args: [wasmUrl, ...params.getAll('arg')],
                    env: { DOTNET_SYSTEM_GLOBALIZATION_INVARIANT: '1' },
                });
                loadMs = performance.now();
                console.log(`[boot] wasm loaded in ${loadMs.toFixed(0)}ms`);
                document.getElementById('loading').classList.add('hidden');
                installGpuErrorHook();

                const origWapiFrame = wapi.instance.exports.wapi_frame;

                wapi._running = false;
                if (wapi._frameHandle) cancelAnimationFrame(wapi._frameHandle);
                wapi._running = true;

                let frameCount = 0;
                let frameCountTotal = 0;
                let lastStatTime = performance.now();
                let lastFrameMs = 0;
                let maxFrameMs = 0;
                let hungAt = 0;
                let lastResult = 0;
                let stopReason = '';
                let lastDraws = 0, lastVerts = 0;

                setInterval(() => {
                    if (hungAt > 0) {
                        const waited = performance.now() - hungAt;
                        if (waited > 2000) {
                            console.error(`[watchdog] wapi_frame stuck for ${waited.toFixed(0)}ms`);
                            hungAt = -1;
                        }
                    }
                }, 1000);

                function frame(ts) {
                    if (!wapi._running) return;
                    const t0 = performance.now();
                    hungAt = t0;
                    wapi._drawStats.draws = 0;
                    wapi._drawStats.totalVerts = 0;
                    wapi._drawStats.submits = 0;
                    wapi._drawStats.writes = 0;
                    const ns = BigInt(Math.round(ts * 1_000_000));
                    try {
                        lastResult = origWapiFrame(ns);
                        if (lastResult === -27) {
                            wapi._running = false;
                            stopReason = 'WAPI_ERR_CANCELED';
                            console.warn('[frame]', stopReason);
                            return;
                        }
                    } catch (e) {
                        hungAt = 0;
                        if (e.message && e.message.startsWith('wapi_exit')) {
                            stopReason = 'wapi_exit';
                            console.warn('[frame]', e.message);
                        } else {
                            stopReason = 'exception: ' + (e.message || e);
                            console.error('[frame] threw:', e.stack || e.message || e);
                        }
                        wapi._running = false;
                        return;
                    }
                    hungAt = 0;
                    const dt = performance.now() - t0;
                    lastFrameMs = dt;
                    if (dt > maxFrameMs) maxFrameMs = dt;
                    frameCount++;
                    frameCountTotal++;
                    if (frameCountTotal === 1) {
                        firstFrameMs = performance.now();
                        console.log(`[boot] first frame at ${firstFrameMs.toFixed(0)}ms (load ${loadMs.toFixed(0)}ms + init ${(firstFrameMs - loadMs).toFixed(0)}ms)`);
                    }
                    lastDraws = wapi._drawStats.draws;
                    lastVerts = wapi._drawStats.totalVerts;
                    wapi._frameHandle = requestAnimationFrame(frame);
                }
                wapi._frameHandle = requestAnimationFrame(frame);

                function cls(val, warnTh, badTh, invert) {
                    if (invert) {
                        if (val < badTh) return 'bad';
                        if (val < warnTh) return 'warn';
                    } else {
                        if (val > badTh) return 'bad';
                        if (val > warnTh) return 'warn';
                    }
                    return 'v';
                }
                function span(cls, text) { return `<span class="${cls}">${text}</span>`; }
                function k(label) { return `<span class="k">${label}</span>`; }
                const sep = '<span class="sep">|</span>';

                function updateStats() {
                    const now = performance.now();
                    const dt = now - lastStatTime;
                    const fps = frameCount > 0 ? (frameCount / (dt / 1000)) : 0;
                    const avgMs = frameCount > 0 ? dt / frameCount : 0;
                    frameCount = 0;
                    lastStatTime = now;

                    const wasmMb = wapi.memory ? (wapi.memory.buffer.byteLength / 1048576) : 0;
                    const jsHeapMb = (performance.memory && performance.memory.usedJSHeapSize)
                        ? (performance.memory.usedJSHeapSize / 1048576) : 0;

                    const fpsCls = cls(fps, 55, 30, true);
                    const msCls = cls(lastFrameMs, 17, 33, false);

                    let parts = [];
                    parts.push(k('fps ') + span(fpsCls, fps.toFixed(0)));
                    parts.push(k('ms ') + span(msCls, lastFrameMs.toFixed(1)));
                    parts.push(k('avg ') + span('v', avgMs.toFixed(1)));
                    parts.push(k('max ') + span('v', maxFrameMs.toFixed(1)));
                    parts.push(k('f ') + span('v', frameCountTotal));
                    parts.push(k('wasm ') + span('v', wasmMb.toFixed(1) + 'M'));
                    if (jsHeapMb > 0) parts.push(k('heap ') + span('v', jsHeapMb.toFixed(1) + 'M'));
                    parts.push(k('draws ') + span('v', lastDraws));
                    parts.push(k('verts ') + span('v', lastVerts));
                    if (gpuErrorCount > 0) {
                        parts.push(k('gpuErr ') + span('bad', gpuErrorCount));
                    }
                    if (hungAt > 0) {
                        parts.push(span('bad', 'HUNG ' + (now - hungAt).toFixed(0) + 'ms'));
                    }
                    if (stopReason) {
                        parts.push(span('bad', 'STOPPED: ' + stopReason));
                    }
                    if (firstFrameMs === 0 && loadMs > 0) {
                        parts.push(span('warn', 'waiting 1st frame'));
                    }
                    statsEl.innerHTML = parts.join(sep);
                }
                setInterval(updateStats, 250);
                updateStats();

            } catch (e) {
                document.getElementById('loading').textContent = `Failed to load: ${e.message}`;
                console.error('[boot] load failed:', e);
                statsEl.innerHTML = '<span class="bad">LOAD FAILED: ' + (e.message || e) + '</span>';
            }
        }
        main();
    </script>
</body>
</html>
